name: CI — Python SDK

on:
  push:
    branches: [main]
    paths:
      - "python/**"
  pull_request:
    branches: [main]
    paths:
      - "python/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uvx ruff check .

      - name: Test
        run: uv run pytest
