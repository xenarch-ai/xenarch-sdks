name: CI — CLI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint (type check)
        run: npm run lint

      - name: Test
        run: npm test
